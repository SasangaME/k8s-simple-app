<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="awsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#232f3e"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="vpcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="pubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="privGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="eksGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#326ce5"/>
      <stop offset="100%" stop-color="#1e4fc2"/>
    </linearGradient>
    <linearGradient id="albGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#ec7211"/>
    </linearGradient>
    <linearGradient id="podGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="svcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </linearGradient>
    <linearGradient id="ecrGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="780" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc" letter-spacing="0.5">k8s-simple-app · AWS EKS Architecture</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#94a3b8">Terraform-provisioned · internet → ALB → Service → pods</text>

  <!-- Client -->
  <g filter="url(#shadow)">
    <circle cx="90" cy="400" r="34" fill="#0ea5e9"/>
    <text x="90" y="407" text-anchor="middle" font-size="26">👤</text>
  </g>
  <text x="90" y="455" text-anchor="middle" font-size="12" fill="#cbd5e1" font-weight="600">Client</text>
  <text x="90" y="471" text-anchor="middle" font-size="10" fill="#94a3b8">HTTP :80</text>

  <!-- AWS Cloud boundary -->
  <rect x="170" y="95" width="1000" height="640" rx="14" fill="url(#awsGrad)" stroke="#ff9900" stroke-width="1.5" stroke-dasharray="6 4"/>
  <g transform="translate(192 118)">
    <rect width="96" height="26" rx="6" fill="#ff9900"/>
    <text x="48" y="18" text-anchor="middle" font-size="13" font-weight="700" fill="#1a2332">☁ AWS · us-east-1</text>
  </g>

  <!-- VPC -->
  <rect x="200" y="165" width="940" height="545" rx="12" fill="url(#vpcGrad)" stroke="#22c55e" stroke-width="1.5"/>
  <g transform="translate(220 183)">
    <rect width="170" height="24" rx="5" fill="#16a34a"/>
    <text x="85" y="17" text-anchor="middle" font-size="12" font-weight="700" fill="#f0fdf4">VPC · 10.20.0.0/16 · 2 AZs</text>
  </g>

  <!-- Public subnets zone -->
  <rect x="220" y="225" width="520" height="160" rx="10" fill="url(#pubGrad)" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="236" y="247" font-size="11" font-weight="700" fill="#fbbf24" letter-spacing="0.8">PUBLIC SUBNETS · 2 AZs</text>

  <!-- ALB -->
  <g filter="url(#shadow)">
    <rect x="260" y="265" width="200" height="100" rx="10" fill="url(#albGrad)"/>
    <text x="360" y="295" text-anchor="middle" font-size="22" fill="#fff">🌐</text>
    <text x="360" y="322" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Application</text>
    <text x="360" y="340" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Load Balancer</text>
    <text x="360" y="357" text-anchor="middle" font-size="10" fill="#fff7ed">internet-facing · HTTP :80</text>
  </g>

  <!-- NAT Gateway -->
  <g filter="url(#shadow)">
    <rect x="560" y="280" width="150" height="70" rx="10" fill="#64748b"/>
    <text x="635" y="308" text-anchor="middle" font-size="20" fill="#fff">🌉</text>
    <text x="635" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">NAT Gateway</text>
    <text x="635" y="344" text-anchor="middle" font-size="9" fill="#e2e8f0">single · egress only</text>
  </g>

  <!-- Private subnets zone -->
  <rect x="220" y="405" width="900" height="285" rx="10" fill="url(#privGrad)" stroke="#60a5fa" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="236" y="427" font-size="11" font-weight="700" fill="#60a5fa" letter-spacing="0.8">PRIVATE SUBNETS · 2 AZs</text>

  <!-- EKS Cluster -->
  <rect x="240" y="445" width="860" height="230" rx="10" fill="#1e3a8a" fill-opacity="0.25" stroke="#326ce5" stroke-width="1.5"/>
  <g transform="translate(258 460)">
    <rect width="220" height="26" rx="6" fill="url(#eksGrad)"/>
    <text x="110" y="18" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">⎈ EKS · managed node group · t3.medium × 2</text>
  </g>

  <!-- Service -->
  <g filter="url(#shadow)">
    <rect x="280" y="510" width="180" height="70" rx="10" fill="url(#svcGrad)"/>
    <text x="370" y="535" text-anchor="middle" font-size="18" fill="#fff">🔀</text>
    <text x="370" y="555" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Service · ClusterIP</text>
    <text x="370" y="571" text-anchor="middle" font-size="10" fill="#f3e8ff">simple-app :80 → :3000</text>
  </g>

  <!-- Deployment wrapper -->
  <rect x="520" y="495" width="560" height="165" rx="10" fill="#5b21b6" fill-opacity="0.18" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="540" y="515" font-size="11" font-weight="700" fill="#c4b5fd" letter-spacing="0.5">DEPLOYMENT · simple-app · replicas=2</text>
  <text x="540" y="530" font-size="9" fill="#a78bfa">rolling update · maxSurge=1 · maxUnavailable=0</text>

  <!-- Pod 1 -->
  <g filter="url(#shadow)">
    <rect x="560" y="545" width="230" height="95" rx="10" fill="url(#podGrad)"/>
    <circle cx="595" cy="580" r="18" fill="#fff" fill-opacity="0.2"/>
    <text x="595" y="587" text-anchor="middle" font-size="20" fill="#fff">⬡</text>
    <text x="620" y="575" font-size="14" font-weight="700" fill="#fff">Pod · simple-app</text>
    <text x="620" y="593" font-size="10" fill="#dcfce7">Node.js · Express</text>
    <text x="620" y="608" font-size="10" fill="#dcfce7">non-root · read-only FS</text>
    <text x="620" y="623" font-size="10" fill="#dcfce7">probes: /healthz /readyz</text>
  </g>

  <!-- Pod 2 -->
  <g filter="url(#shadow)">
    <rect x="820" y="545" width="230" height="95" rx="10" fill="url(#podGrad)"/>
    <circle cx="855" cy="580" r="18" fill="#fff" fill-opacity="0.2"/>
    <text x="855" y="587" text-anchor="middle" font-size="20" fill="#fff">⬡</text>
    <text x="880" y="575" font-size="14" font-weight="700" fill="#fff">Pod · simple-app</text>
    <text x="880" y="593" font-size="10" fill="#dcfce7">Node.js · Express</text>
    <text x="880" y="608" font-size="10" fill="#dcfce7">non-root · read-only FS</text>
    <text x="880" y="623" font-size="10" fill="#dcfce7">probes: /healthz /readyz</text>
  </g>

  <!-- ECR (side panel) -->
  <g filter="url(#shadow)">
    <rect x="790" y="240" width="310" height="130" rx="10" fill="#0f172a" stroke="#ff9900" stroke-width="1.5"/>
    <rect x="790" y="240" width="310" height="28" rx="10" fill="url(#ecrGrad)"/>
    <rect x="790" y="258" width="310" height="10" fill="url(#ecrGrad)"/>
    <text x="945" y="259" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">🗄 Amazon ECR</text>
    <text x="810" y="290" font-size="11" fill="#cbd5e1">repository:</text>
    <text x="810" y="306" font-size="11" font-family="ui-monospace, monospace" fill="#fbbf24">k8s-simple-app:&lt;sha&gt;</text>
    <text x="810" y="332" font-size="10" fill="#94a3b8">• scan-on-push  • AES-256</text>
    <text x="810" y="348" font-size="10" fill="#94a3b8">• lifecycle: keep last 20</text>
    <text x="810" y="364" font-size="10" fill="#94a3b8">• pulled by nodes via IAM</text>
  </g>

  <!-- Client → ALB -->
  <path d="M 128 400 Q 180 400 220 345 T 260 315" fill="none" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="165" y="345" font-size="10" fill="#fbbf24" font-weight="600">HTTP</text>

  <!-- ALB → Pod 1 (target-type: ip) -->
  <path d="M 430 365 Q 440 460 630 545" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <!-- ALB → Pod 2 -->
  <path d="M 445 365 Q 600 440 895 545" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="560" y="430" font-size="10" fill="#fbbf24" font-weight="600">target-type: ip → pod IPs</text>

  <!-- Service → Pod 1 -->
  <path d="M 460 555 L 560 575" fill="none" stroke="#c4b5fd" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
  <!-- Service → Pod 2 -->
  <path d="M 460 560 Q 640 560 820 580" fill="none" stroke="#c4b5fd" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

  <!-- Pod → NAT (egress) -->
  <path d="M 675 545 Q 650 440 635 350" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrowGreen)"/>
  <text x="705" y="470" font-size="10" fill="#4ade80">egress</text>

  <!-- ECR → Pods (image pull) -->
  <path d="M 945 370 Q 945 450 935 545" fill="none" stroke="#ff9900" stroke-width="1.5" stroke-dasharray="2 3" marker-end="url(#arrow)"/>
  <text x="955" y="460" font-size="10" fill="#ff9900">image pull</text>

  <!-- Legend -->
  <g transform="translate(40 610)">
    <rect width="160" height="145" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="80" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#f1f5f9" letter-spacing="0.8">LEGEND</text>
    <line x1="15" y1="38" x2="40" y2="38" stroke="#fbbf24" stroke-width="2.5"/>
    <text x="48" y="42" font-size="10" fill="#cbd5e1">public HTTP</text>
    <line x1="15" y1="58" x2="40" y2="58" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="48" y="62" font-size="10" fill="#cbd5e1">ALB → pod IP</text>
    <line x1="15" y1="78" x2="40" y2="78" stroke="#c4b5fd" stroke-width="1.8"/>
    <text x="48" y="82" font-size="10" fill="#cbd5e1">cluster traffic</text>
    <line x1="15" y1="98" x2="40" y2="98" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="48" y="102" font-size="10" fill="#cbd5e1">egress via NAT</text>
    <line x1="15" y1="118" x2="40" y2="118" stroke="#ff9900" stroke-width="1.5" stroke-dasharray="2 3"/>
    <text x="48" y="122" font-size="10" fill="#cbd5e1">image pull</text>
  </g>

  <!-- Footer note -->
  <text x="600" y="760" text-anchor="middle" font-size="10" fill="#64748b">Provisioned by Terraform · AWS Load Balancer Controller creates the ALB from the Ingress · IRSA binds the controller to its IAM role</text>
</svg>
